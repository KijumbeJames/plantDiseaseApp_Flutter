name: plant_disease_app
description: "CNN-based plant disease detection for cassava and maize."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0-319.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  tflite_flutter: ^0.10.4
  image_picker: ^1.0.7
  image: ^4.1.3
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/model/
    - assets/labels/
    - assets/images/